name: '[Reusable] Post-Merge Release Pipeline'

# Triggered after a merge into a release/* branch.
# Responsibilities:
#  - Build & Test
#  - Optional Jira + Sonar
#  - Create patch tag (for bugfix merges)
#  - Propagate to later releases and develop

on:
  workflow_call:
    inputs:
      release_branch:
        description: 'Release branch that was merged into (e.g. release/0.1)'
        type: string
        required: true
      java_version:
        type: string
        required: false
        default: '17'
      java_distribution:
        type: string
        required: false
        default: 'temurin'
      maven_args:
        type: string
        required: false
        default: ''
      # ── Jira ───────────────────────────────────────────────
      jira_enabled:
        type: boolean
        required: false
        default: false
      jira_base_url:
        type: string
        required: false
        default: ''
      jira_project_key:
        type: string
        required: false
        default: ''
      jira_allowed_types:
        type: string
        required: false
        default: ''
      jira_allowed_statuses:
        type: string
        required: false
        default: ''
      # ── Sonar ──────────────────────────────────────────────
      sonar_enabled:
        type: boolean
        required: false
        default: false
      sonar_host_url:
        type: string
        required: false
        default: ''
      sonar_organization:
        type: string
        required: false
        default: ''
      sonar_project_key:
        type: string
        required: false
        default: ''
      # ── Propagation ────────────────────────────────────────
      propagate:
        description: 'Propagate changes to later releases and develop'
        type: boolean
        required: false
        default: true
    secrets:
      github_token:
        required: true
      jira_user_email:
        required: false
      jira_api_token:
        required: false
      sonar_token:
        required: false

jobs:
  # ─────────────────────────────────────────────────────────
  jira-validation:
    name: 'Jira Validation'
    if: ${{ inputs.jira_enabled }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Collect commit messages
        id: commits
        shell: bash
        run: |
          MSGS=$(git log --format="%s" -n 30 | python3 -c "import sys,json; print(json.dumps([l.rstrip() for l in sys.stdin]))")
          echo "messages=${MSGS}" >> $GITHUB_OUTPUT

      - name: Validate Jira tickets
        uses: JAGT1806/repo-actions/.github/actions/jira-validate@v0.1.0
        with:
          jira_base_url: ${{ inputs.jira_base_url }}
          jira_user_email: ${{ secrets.jira_user_email }}
          jira_api_token: ${{ secrets.jira_api_token }}
          jira_project_key: ${{ inputs.jira_project_key }}
          allowed_issue_types: ${{ inputs.jira_allowed_types }}
          allowed_statuses: ${{ inputs.jira_allowed_statuses }}
          commits_json: ${{ steps.commits.outputs.messages }}

  # ─────────────────────────────────────────────────────────
  build-test:
    name: 'Build & Test'
    runs-on: ubuntu-latest
    needs: [jira-validation]
    if: |
      always() &&
      (needs.jira-validation.result == 'success' || needs.jira-validation.result == 'skipped')
    outputs:
      current_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.github_token }}

      - name: Get version
        id: version
        uses: JAGT1806/repo-actions/.github/actions/get-version@v0.1.0

      - name: Build & Test
        uses: JAGT1806/repo-actions/.github/actions/maven-build@v0.1.0
        with:
          java_version: ${{ inputs.java_version }}
          java_distribution: ${{ inputs.java_distribution }}
          maven_args: ${{ inputs.maven_args }}
          run_tests: 'true'

  # ─────────────────────────────────────────────────────────
  sonar:
    name: 'Sonar Analysis'
    if: ${{ inputs.sonar_enabled }}
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Analysis
        uses: JAGT1806/repo-actions/.github/actions/sonar-analysis@v0.1.0
        with:
          sonar_token: ${{ secrets.sonar_token }}
          sonar_host_url: ${{ inputs.sonar_host_url }}
          sonar_organization: ${{ inputs.sonar_organization }}
          sonar_project_key: ${{ inputs.sonar_project_key }}
          java_version: ${{ inputs.java_version }}
          java_distribution: ${{ inputs.java_distribution }}

  # ─────────────────────────────────────────────────────────
  tag-and-propagate:
    name: 'Tag & Propagate'
    runs-on: ubuntu-latest
    needs: [build-test, sonar]
    if: |
      always() &&
      needs.build-test.result == 'success' &&
      (needs.sonar.result == 'success' || needs.sonar.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.github_token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: version
        uses: JAGT1806/repo-actions/.github/actions/get-version@v0.1.0

      - name: Create tag if not exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git fetch --tags
          if ! git tag -l "$TAG" | grep -q "$TAG"; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "✅ Created tag $TAG"
          else
            echo "ℹ️ Tag $TAG already exists"
          fi

      - name: Propagate to later releases and develop
        if: ${{ inputs.propagate }}
        uses: JAGT1806/repo-actions/.github/actions/propagate-release@v0.1.0
        with:
          source_branch: ${{ inputs.release_branch }}
          github_token: ${{ secrets.github_token }}

      - name: Summary
        run: |
          echo "## ✅ Release Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ inputs.release_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`v${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY